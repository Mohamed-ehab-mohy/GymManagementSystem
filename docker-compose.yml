services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: gym-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Gym@2024Secret!"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Gym@2024Secret!" -C -Q "SELECT 1" || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "Gym@2024Secret!" -Q "SELECT 1"
      interval: 15s
      retries: 15
      start_period: 30s

  postgres-logs:
    image: postgres:16-alpine
    container_name: gym-postgres-logs
    environment:
      POSTGRES_DB: gymy_logs
      POSTGRES_USER: gymy
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymy -d gymy_logs"]
      interval: 10s
      retries: 5
      start_period: 10s

  seq:
    image: datalust/seq:latest
    container_name: gym-seq
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: "Admin@123"
    ports:
      - "5341:5341"
      - "8081:80"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gym-app
    ports:
      - "5000:80"
    depends_on:
      sqlserver:
        condition: service_started
      postgres-logs:
        condition: service_started
      seq:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://0.0.0.0:80"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=GymManagementDb;User Id=sa;Password=Gym@2024Secret!;TrustServerCertificate=true"
      ConnectionStrings__LogsDb: "Host=postgres-logs;Database=gymy_logs;Username=gymy;Password=secret"
      Serilog__WriteTo__0__Name: "Seq"
      Serilog__WriteTo__0__Args__serverUrl: "http://seq:5341"

  prometheus:
    image: prom/prometheus:latest
    container_name: gym-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - app

  grafana:
    image: grafana/grafana:latest
    container_name: gym-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  sqlserver-data:
  postgres-data:
